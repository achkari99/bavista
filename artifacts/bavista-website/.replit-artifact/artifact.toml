kind = "web"
previewPath = "/"
title = "Mocktail by Bavista"
version = "1.0.0"
id = "artifacts/bavista-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25316

[services.development]
run = "pnpm --filter @workspace/bavista-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bavista-website", "run", "build" ]
publicDir = "artifacts/bavista-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25316"
BASE_PATH = "/"
